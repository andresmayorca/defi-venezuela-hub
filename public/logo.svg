<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60">
  <!-- DV Logo with text -->
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon: DV in circle -->
  <circle cx="30" cy="30" r="25" fill="none" stroke="#00FF88" stroke-width="2" opacity="0.3"/>
  <text
    x="30"
    y="36"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="24"
    font-weight="900"
    fill="#00FF88"
    text-anchor="middle"
    dominant-baseline="middle"
    filter="url(#glow)"
    letter-spacing="-1"
  >DV</text>

  <!-- Text: DefiVenezuela -->
  <text
    x="65"
    y="20"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="18"
    font-weight="800"
    fill="#F0F1F5"
    dominant-baseline="middle"
  >DefiVenezuela</text>

  <!-- Subtext: Hub Web3 -->
  <text
    x="65"
    y="42"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="11"
    font-weight="500"
    fill="#9DA5B4"
    dominant-baseline="middle"
    opacity="0.7"
  >Hub Web3</text>
</svg>
